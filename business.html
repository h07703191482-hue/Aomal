<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>البندر - أعمال</title>
    <style>
        /* --- تعريف الألوان --- */
        :root {
            --primary: #5A228B;
            --primary-hover: #4A1A75;
            --secondary-gold: #FFC107;
            --danger: #EF4444;
            --success: #10B981;
            --bg-color: #F4F6F9;
            --card-bg: #FFFFFF;
            --text-main: #111827;
            --text-sub: #6B7280;
            --border-color: #E5E7EB;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --primary: #7A3BBA;
                --bg-color: #121212;
                --card-bg: #1E1E1E;
                --text-main: #F9FAFB;
                --text-sub: #9CA3AF;
                --border-color: #334155;
            }
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        body { background-color: var(--bg-color); color: var(--text-main); overflow-x: hidden; transition: 0.3s; }

        /* --- Splash Screen --- */
        #splash-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100vh;
            background-color: var(--card-bg); display: flex; justify-content: center; align-items: center;
            z-index: 10000; transition: 0.8s;
        }
        #splash-screen.hidden { opacity: 0; visibility: hidden; }

        .street-container { position: relative; width: 100%; height: 100px; overflow: hidden; background: var(--bg-color); margin-top: 20px; }
        .street { position: absolute; bottom: 20px; width: 100%; height: 20px; background: #333; }
        .motorcycle-wrapper { position: absolute; bottom: 15px; left: -100px; animation: moveRight 2.5s linear forwards; }
        @keyframes moveRight { 0% { left: -100px; } 100% { left: 110%; } }

        /* --- واجهات تسجيل الدخول --- */
        .auth-container {
            display: none; height: 100vh; flex-direction: column; justify-content: center; align-items: center; padding: 20px;
        }
        .auth-card {
            background: var(--card-bg); padding: 30px; border-radius: 20px; width: 100%; max-width: 400px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1); text-align: center;
        }
        .auth-card h2 { margin-bottom: 20px; color: var(--primary); }
        .auth-card input {
            width: 100%; padding: 12px; margin-bottom: 15px; border: 2px solid var(--border-color);
            border-radius: 10px; background: var(--bg-color); color: var(--text-main); outline: none;
        }
        .auth-card button {
            width: 100%; padding: 12px; background: var(--primary); color: white; border: none;
            border-radius: 10px; font-weight: bold; cursor: pointer; transition: 0.3s;
        }
        .role-btn {
            background: var(--card-bg) !important; color: var(--text-main) !important;
            border: 2px solid var(--primary) !important; margin-bottom: 10px;
        }
        .role-btn:hover { background: var(--primary) !important; color: white !important; }

        /* --- التطبيق الرئيسي --- */
        #main-app { display: none; }
        .navbar { background: var(--primary); color: white; padding: 15px; display: flex; justify-content: space-between; align-items: center; }
        .container { padding: 20px; max-width: 800px; margin: 0 auto; }
        .order-card { background: var(--card-bg); padding: 15px; border-radius: 12px; margin-bottom: 15px; border: 1px solid var(--border-color); border-right: 5px solid var(--secondary-gold); }
        .btn-group { display: flex; gap: 10px; margin-top: 15px; }
        .btn { flex: 1; padding: 10px; border: none; border-radius: 8px; color: white; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

    <div id="splash-screen">
        <div style="text-align: center; width: 100%;">
            <h1 style="color: var(--primary);">مرحبا يا مندوبين البندر</h1>
            <div class="street-container"><div class="street"></div><div class="motorcycle-wrapper">🛵</div></div>
        </div>
    </div>

    <div id="step-name" class="auth-container">
        <div class="auth-card">
            <h2>أهلاً بك!</h2>
            <p style="margin-bottom: 15px; color: var(--text-sub);">ما هو اسمك؟</p>
            <input type="text" id="user-name" placeholder="أدخل اسمك الكامل">
            <button onclick="goToPhone()">متابعة</button>
        </div>
    </div>

    <div id="step-phone" class="auth-container">
        <div class="auth-card">
            <h2>رقم الهاتف</h2>
            <p style="margin-bottom: 15px; color: var(--text-sub);">يرجى إدخال رقم هاتف عراقي</p>
            <input type="tel" id="user-phone" placeholder="07XXXXXXXXX" maxlength="11">
            <button onclick="goToRoles()">تأكيد الرقم</button>
        </div>
    </div>

    <div id="step-roles" class="auth-container">
        <div class="auth-card">
            <h2>كيف تود الانضمام؟</h2>
            <button class="role-btn" onclick="checkRestaurantCode()">انضمام كـ صاحب مطعم</button>
            <button class="role-btn" onclick="finishLogin('driver')">انضمام كـ مندوب</button>
        </div>
    </div>

    <div id="main-app">
        <header class="navbar">
            <h1>مندوبين <span>البندر</span></h1>
            <span id="display-user-role" style="font-size: 12px; background: rgba(255,255,255,0.2); padding: 5px 10px; border-radius: 20px;"></span>
        </header>
        <div class="container">
            <h2 id="view-title" style="margin-bottom: 20px;">الطلبات المتوفرة</h2>
            <div id="orders-list"></div>
        </div>
    </div>

    <script>
        let userName = "";
        let userRole = "";

        // تشغيل الـ Splash ثم إظهار واجهة الاسم
        window.onload = () => {
            setTimeout(() => {
                document.getElementById('splash-screen').classList.add('hidden');
                document.getElementById('step-name').style.display = 'flex';
                document.body.style.overflow = 'auto';
            }, 3000);
        };

        function goToPhone() {
            userName = document.getElementById('user-name').value;
            if (userName.length < 3) return alert("يرجى إدخال اسم حقيقي");
            document.getElementById('step-name').style.display = 'none';
            document.getElementById('step-phone').style.display = 'flex';
        }

        function goToRoles() {
            const phone = document.getElementById('user-phone').value;
            const iraqiPhoneRegex = /^07[0-9]{9}$/;
            if (!iraqiPhoneRegex.test(phone)) return alert("يرجى إدخال رقم عراقي صحيح مكون من 11 رقم");
            document.getElementById('step-phone').style.display = 'none';
            document.getElementById('step-roles').style.display = 'flex';
        }

        function checkRestaurantCode() {
            const code = prompt("يرجى إدخال رمز التحقق الخاص بالمطاعم:");
            // الرمز الافتراضي حالياً هو 1234
            if (code === "1234") { 
                finishLogin('restaurant');
            } else {
                alert("الرمز غير صحيح، يرجى مراجعة الإدارة");
            }
        }

        function finishLogin(role) {
            userRole = role;
            document.getElementById('step-roles').style.display = 'none';
            document.getElementById('main-app').style.display = 'block';
            document.getElementById('display-user-role').innerText = role === 'restaurant' ? "صاحب مطعم" : "مندوب";
            renderOrders();
        }

        function renderOrders() {
            const list = document.getElementById('orders-list');
            const orders = [
                { id: "101", customer: "أحمد علي", items: "وجبة برغر عائلية", price: "15,000 د.ع" },
                { id: "102", customer: "سارة محمود", items: "بيتزا ايطالية عدد 2", price: "22,000 د.ع" }
            ];
            
            list.innerHTML = orders.map(o => `
                <div class="order-card">
                    <div style="display:flex; justify-content:space-between; font-weight:bold;">
                        <span>طلب #${o.id}</span><span>${o.customer}</span>
                    </div>
                    <p style="color:var(--text-sub); margin: 10px 0;">${o.items}</p>
                    <div style="color:var(--success); font-weight:bold;">${o.price}</div>
                    <div class="btn-group">
                        ${userRole === 'restaurant' ? 
                            `<button class="btn" style="background:var(--success)">تجهيز</button><button class="btn" style="background:var(--danger)">رفض</button>` : 
                            `<button class="btn" style="background:var(--primary)">استلام</button>`
                        }
                    </div>
                </div>
            `).join('');
        }
    </script>
</body>
</html>
