<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>البندر لخدمات التوصيل - أعمال</title>
    
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/png" href="logo.png.png">
    <link rel="apple-touch-icon" href="logo.png.png">
    <meta name="theme-color" content="#0D47A1">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

    <style>
        :root {
            --primary: #0D47A1;
            --primary-hover: #1565C0;
            --secondary-gold: #FFC107;
            --danger: #EF4444;
            --success: #10B981;
            --bg-color: #F4F6F9;
            --card-bg: #FFFFFF;
            --text-main: #111827;
            --text-sub: #6B7280;
            --border-color: #E5E7EB;
            --gold: #FFC107;
            --surface: #FFFFFF;
            --radius-lg: 15px;
            --radius-pill: 50px;
            --shadow-sm: 0 4px 6px rgba(0,0,0,0.05);
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --primary: #1565C0;
                --bg-color: #121212;
                --card-bg: #1E1E1E;
                --text-main: #F9FAFB;
                --text-sub: #9CA3AF;
                --border-color: #334155;
                --surface: #1E1E1E;
            }
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        body { background-color: var(--bg-color); color: var(--text-main); overflow-x: hidden; transition: 0.3s; }

        .screen { display: none; }
        .container { padding: 20px; max-width: 800px; margin: 0 auto; padding-bottom: 100px; }
        .form-card { background: var(--card-bg); padding: 20px; border-radius: 15px; margin-bottom: 20px; border: 1px solid var(--border-color); }
        .form-group { margin-bottom: 15px; text-align: right; }
        .form-group label { display: block; margin-bottom: 5px; color: var(--text-sub); font-size: 14px; }
        .form-group input { width: 100%; padding: 16px 20px; border: 1px solid var(--border-color); border-radius: 20px; font-size: 15px; font-weight: 600; background: var(--bg-color); color: var(--text-main); outline: none; }
        
        .screen-header-title { margin-bottom: 20px; color: var(--text-main); font-size: 22px; font-weight: bold; }
        .back-btn { background: none; border: none; color: var(--text-main); font-size: 18px; cursor: pointer; margin-bottom: 15px; width: 45px; height: 45px; border-radius: 14px; display: flex; align-items: center; justify-content: center; }
        .send-btn { width: 100%; padding: 18px; border: none; border-radius: 20px; font-size: 18px; font-weight: 800; cursor: pointer; color: white; display: flex; justify-content: center; align-items: center; gap: 8px; }
        
        .order-card { background: var(--card-bg); padding: 15px; border-radius: 12px; margin-bottom: 15px; border: 1px solid var(--border-color); border-right: 5px solid var(--secondary-gold); }
        .btn-group { display: flex; gap: 10px; margin-top: 15px; }
        .btn-group .btn { flex: 1; padding: 10px; border: none; border-radius: 8px; color: white; font-weight: bold; cursor: pointer; transition: 0.3s;}

        /* Tabs Styling */
        .tab-nav { display: flex; background: var(--card-bg); margin-bottom: 20px; border-radius: 15px; border: 1px solid var(--border-color); overflow: hidden; }
        .tab-btn { flex: 1; padding: 15px; border: none; background: none; color: var(--text-sub); font-weight: bold; cursor: pointer; transition: 0.3s; font-size: 14px; }
        .tab-btn.active { background: var(--primary); color: white; }

        .driver-status-bar { display: none; background: var(--gold); color: #000; font-weight: 800; font-size: 12px; padding: 6px 0; position: sticky; top: 0; z-index: 100; text-align: center; }

        #splash-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #0D47A1; z-index: 99999; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        #splash-screen.hidden { opacity: 0; visibility: hidden; pointer-events: none; transition: 0.5s; }
        #app-logo-splash { width: 130px; height: 130px; background: white; border-radius: 35px; display: flex; align-items: center; justify-content: center; margin-top: -100px; box-shadow: 0 20px 50px rgba(0,0,0,0.2); }
        #app-logo-splash i { font-size: 65px; color: #0D47A1; }

        .auth-container { display: none; height: 100vh; flex-direction: column; justify-content: center; align-items: center; padding: 20px; }
        .auth-card { background: var(--card-bg); padding: 30px; border-radius: 20px; width: 100%; max-width: 400px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); text-align: center; border: 1px solid var(--border-color); }
        .auth-card h2 { margin-bottom: 20px; color: var(--primary); }
        .auth-card button { width: 100%; padding: 12px; background: var(--primary); color: white; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; }

        .navbar { background: var(--primary); color: white; padding: 15px; display: flex; justify-content: space-between; align-items: center; }
        .logout-btn { background: var(--danger); color: white; border: none; padding: 5px 10px; border-radius: 5px; cursor: pointer; font-size: 12px; }
    </style>
</head>
<body>

    <div id="driver-status-badge" class="driver-status-bar">أنت الآن في وضع العمل النشط 🟢</div>

    <div id="splash-screen">
      <div id="app-logo-splash"><i class="fas fa-motorcycle"></i></div>
      <div style="color: white; margin-top: 20px; text-align: center;">
          <h2>البندر أعمال</h2>
          <p>أسرع نظام للمناديب</p>
      </div>
    </div>

    <div id="step-name" class="auth-container">
        <div class="auth-card">
            <h2>أهلاً كابتن!</h2>
            <p style="margin-bottom: 15px; color: var(--text-sub);">ما هو اسمك؟</p>
            <div class="form-group"><input type="text" id="user-name" placeholder="أدخل اسمك الكامل"></div>
            <button onclick="goToPhone()">متابعة</button>
        </div>
    </div>

    <div id="step-phone" class="auth-container">
        <div class="auth-card">
            <h2>رقم الهاتف</h2>
            <p style="margin-bottom: 15px; color: var(--text-sub);">يرجى إدخال رقم هاتفك</p>
            <div class="form-group">
                <input type="tel" id="user-phone" placeholder="07XXXXXXXXX" dir="ltr" maxlength="11">
            </div>
            <button onclick="finishLogin()">دخول للنظام</button>
        </div>
    </div>

    <div id="main-app" class="screen">
        <header class="navbar">
            <h1 style="font-size: 18px;">كابتن <span>البندر</span></h1>
            <button class="logout-btn" onclick="logout()">خروج</button>
        </header>

        <div class="container">
            <div class="tab-nav">
                <button id="btn-public" class="tab-btn active" onclick="switchTab('public')"><i class="fas fa-globe"></i> الطلبات العامة</button>
                <button id="btn-private" class="tab-btn" onclick="switchTab('private')"><i class="fas fa-user-check"></i> طلباتك المحجوزة</button>
            </div>

            <div id="orders-container">
                <div id="public-orders-list"></div>
                <div id="private-orders-list" style="display: none;"></div>
            </div>

            <div class="form-card" style="margin-top: 20px;">
                <button id="statusToggleBtn" class="send-btn" style="background: #10B981; font-size: 14px; padding: 12px;" onclick="toggleDriverStatus()">
                    <i class="fas fa-check-circle"></i> متاح للعمل
                </button>
                <button class="send-btn" style="background: #8B5CF6; margin-top: 10px; font-size: 14px; padding: 12px;" onclick="showScreen('plaza-screen')">
                    <i class="fas fa-qrcode"></i> تأكيد تسليم طلب
                </button>
            </div>
        </div>
    </div>

    <div id="plaza-screen" class="screen container">
        <button class="back-btn" onclick="showScreen('main-app');"><i class="fas fa-arrow-right"></i></button>
        <h2 class="screen-header-title">تأكيد تسليم الطلب</h2>
        <div class="form-card">
            <div class="form-group">
                <label>رقم هاتف الزبون</label>
                <input type="tel" id="driverVerifyPhoneInput" placeholder="07XXXXXXXXX" style="text-align:center;">
            </div>
            <div class="form-group">
                <label>كود التأكيد</label>
                <input type="number" id="driverVerifyInput" placeholder="1234" style="text-align:center; font-size:24px;">
            </div>
            <button class="send-btn" style="background: #10B981;" onclick="processVerifyCode()"><i class="fas fa-check-circle"></i> تأكيد وإكمال</button>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBXW3gL4PszJjmgmVVOjkuEqe-WkWHyO60",
            authDomain: "al-bandar-f02f6.firebaseapp.com",
            databaseURL: "https://al-bandar-f02f6-default-rtdb.firebaseio.com",
            projectId: "al-bandar-f02f6",
            storageBucket: "al-bandar-f02f6.firebasestorage.app",
            messagingSenderId: "799678549296",
            appId: "1:799678549296:web:bd1cc0ff99a680eabfccf5"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let userName = localStorage.getItem('albandar_name') || "";
        let userPhone = localStorage.getItem('albandar_phone') || "";
        let currentTab = 'public';

        window.onload = () => {
            setTimeout(() => {
                document.getElementById('splash-screen').classList.add('hidden');
                if (userName && userPhone) {
                    showScreen('main-app');
                    listenToOrders();
                } else {
                    document.getElementById('step-name').style.display = 'flex';
                }
            }, 2000);
        };

        function goToPhone() {
            userName = document.getElementById('user-name').value.trim();
            if (userName.length < 3) return alert("أدخل اسمك الكامل");
            document.getElementById('step-name').style.display = 'none';
            document.getElementById('step-phone').style.display = 'flex';
        }

        function finishLogin() {
            userPhone = document.getElementById('user-phone').value.trim();
            if (userPhone.length < 10) return alert("أدخل رقم هاتف صحيح");
            localStorage.setItem('albandar_name', userName);
            localStorage.setItem('albandar_phone', userPhone);
            location.reload();
        }

        function showScreen(id) {
            document.querySelectorAll('.screen, .auth-container').forEach(s => s.style.display = 'none');
            document.getElementById(id).style.display = 'block';
            if(id === 'main-app') document.getElementById('driver-status-badge').style.display = 'block';
            else document.getElementById('driver-status-badge').style.display = 'none';
        }

        function switchTab(tab) {
            currentTab = tab;
            document.getElementById('btn-public').classList.toggle('active', tab === 'public');
            document.getElementById('btn-private').classList.toggle('active', tab === 'private');
            document.getElementById('public-orders-list').style.display = tab === 'public' ? 'block' : 'none';
            document.getElementById('private-orders-list').style.display = tab === 'private' ? 'block' : 'none';
        }

        function listenToOrders() {
            db.ref('orders').on('value', (snapshot) => {
                const data = snapshot.val();
                let publicHtml = "";
                let privateHtml = "";
                let foundPublic = false;
                let foundPrivate = false;

                for (let id in data) {
                    const o = data[id];
                    // طلبات عامة: الحالة pending_driver ولم يحجزها أحد
                    if (o.status === 'pending_driver' && !o.driverPhone) {
                        foundPublic = true;
                        publicHtml += renderOrderCard(id, o, 'public');
                    }
                    // طلبات محجوزة: محجوزة من قبل هذا المندوب تحديداً
                    else if (o.driverPhone === userPhone && (o.status === 'accepted_driver' || o.status === 'pending_driver')) {
                        foundPrivate = true;
                        privateHtml += renderOrderCard(id, o, 'private');
                    }
                }

                document.getElementById('public-orders-list').innerHTML = foundPublic ? publicHtml : `<div style="text-align:center; padding:50px; color:gray;">لا توجد طلبات عامة حالياً</div>`;
                document.getElementById('private-orders-list').innerHTML = foundPrivate ? privateHtml : `<div style="text-align:center; padding:50px; color:gray;">ليس لديك طلبات محجوزة</div>`;
            });
        }

        function renderOrderCard(id, o, type) {
            return `
                <div class="order-card">
                    <div style="display:flex; justify-content:space-between; font-weight:bold; margin-bottom:5px;">
                        <span>طلب #${o.id || id}</span>
                        <span style="color:var(--primary);">${o.customer || 'زبون'}</span>
                    </div>
                    <p style="font-size:13px; color:var(--text-sub);">${o.items || 'لا توجد تفاصيل'}</p>
                    <div style="color:var(--success); font-weight:bold; margin-top:10px;">${o.price || 'الأجرة: 2,000 د.ع'}</div>
                    <div class="btn-group">
                        ${type === 'public' ? 
                            `<button class="btn" style="background:var(--primary)" onclick="lockOrder('${id}')"><i class="fas fa-lock"></i> حجز الطلب لـي</button>` : 
                            `<button class="btn" style="background:var(--success)" onclick="showScreen('plaza-screen')"><i class="fas fa-check"></i> إنهاء وتسليم</button>`
                        }
                    </div>
                </div>`;
        }

        function lockOrder(id) {
            if(!confirm("هل أنت متأكد من حجز هذا الطلب؟")) return;
            db.ref('orders/' + id).update({
                status: 'accepted_driver',
                driverName: userName,
                driverPhone: userPhone
            }).then(() => {
                alert("تم حجز الطلب! انتقل لخانة طلباتك المحجوزة");
                switchTab('private');
            });
        }

        function toggleDriverStatus() {
            const btn = document.getElementById('statusToggleBtn');
            const badge = document.getElementById('driver-status-badge');
            let isAvailable = btn.style.background.includes('16, 185, 129'); // Check if green

            if(isAvailable) {
                btn.style.background = 'var(--danger)';
                btn.innerHTML = '<i class="fas fa-minus-circle"></i> مشغول حالياً';
                badge.innerText = 'أنت الآن مشغول 🔴';
                badge.style.background = 'var(--danger)';
                badge.style.color = 'white';
            } else {
                btn.style.background = '#10B981';
                btn.innerHTML = '<i class="fas fa-check-circle"></i> متاح للعمل';
                badge.innerText = 'أنت الآن في وضع العمل النشط 🟢';
                badge.style.background = 'var(--gold)';
                badge.style.color = '#000';
            }
        }

        function processVerifyCode() {
            const code = document.getElementById('driverVerifyInput').value;
            if(!code) return alert("أدخل كود التأكيد");
            confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });
            alert("تم إكمال الطلب بنجاح! عاشت ايدك كابتن");
            showScreen('main-app');
        }

        function logout() {
            if(confirm("هل تريد الخروج؟")) {
                localStorage.clear();
                location.reload();
            }
        }
    </script>
</body>
</html>
