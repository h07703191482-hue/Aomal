<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <title>بيئة ثلاثية الأبعاد واقعية</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; }
        canvas { display: block; }
        #ui {
            position: absolute;
            top: 20px;
            width: 100%;
            text-align: center;
            color: white;
            font-family: Arial, sans-serif;
            pointer-events: none;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
        }
    </style>
</head>
<body>
    <div id="ui">
        <h2>نموذج مبدئي لبيئة واقعية</h2>
        <p>استخدم الماوس (السحب والتقريب) للتحكم بالكاميرا ورؤية تفاصيل الإضاءة والظلال</p>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

    <script>
        // 1. إعداد المشهد
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87CEEB); // سماء واقعية
        scene.fog = new THREE.FogExp2(0x87CEEB, 0.015); // ضباب للعمق

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 5, 12);

        // 2. إعداد محرك الرسم (Renderer) بدقة عالية
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true; // تفعيل الظلال
        renderer.shadowMap.type = THREE.PCFSoftShadowMap; // ظلال ناعمة جداً
        document.body.appendChild(renderer.domElement);

        // 3. الإضاءة (سر الواقعية)
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.4); // ضوء محيطي
        scene.add(ambientLight);

        const sunLight = new THREE.DirectionalLight(0xffffff, 1.2); // ضوء الشمس
        sunLight.position.set(10, 20, 10);
        sunLight.castShadow = true;
        sunLight.shadow.mapSize.width = 2048; // دقة الظل
        sunLight.shadow.mapSize.height = 2048;
        scene.add(sunLight);

        // 4. المواد الفيزيائية (PBR)
        // الأرضية
        const floorGeometry = new THREE.PlaneGeometry(200, 200);
        const floorMaterial = new THREE.MeshStandardMaterial({
            color: 0x2e8b57, // لون عشبي داكن
            roughness: 0.9,
            metalness: 0.0
        });
        const floor = new THREE.Mesh(floorGeometry, floorMaterial);
        floor.rotation.x = -Math.PI / 2;
        floor.receiveShadow = true;
        scene.add(floor);

        // الكرة المعدنية الواقعية
        const sphereGeometry = new THREE.SphereGeometry(2, 64, 64); // دقة هندسية عالية
        const sphereMaterial = new THREE.MeshPhysicalMaterial({
            color: 0xff3333,
            metalness: 0.7,      // انعكاس معدني
            roughness: 0.2,      // نعومة السطح
            clearcoat: 1.0,      // طبقة طلاء لامعة
            clearcoatRoughness: 0.1
        });
        const sphere = new THREE.Mesh(sphereGeometry, sphereMaterial);
        sphere.castShadow = true;
        scene.add(sphere);

        // 5. التحكم بالكاميرا
        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true; // حركة سلسة للكاميرا
        controls.dampingFactor = 0.05;
        controls.maxPolarAngle = Math.PI / 2 - 0.05; // منع الكاميرا من النزول تحت الأرض

        // 6. حلقة التحديث والتحريك (Animation Loop)
        const clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);

            const elapsedTime = clock.getElapsedTime();

            // حركة ارتداد ودوران واقعية للكرة
            sphere.position.y = Math.abs(Math.sin(elapsedTime * 2)) * 3 + 2;
            sphere.rotation.x = elapsedTime;
            sphere.rotation.y = elapsedTime * 0.5;

            controls.update();
            renderer.render(scene, camera);
        }

        animate();

        // توافق الشاشة عند تغيير حجم المتصفح
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
