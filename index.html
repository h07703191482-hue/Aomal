<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>لعبة الهروب من الميناء - نسخة الموبايل</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; touch-action: none; }
        #ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }
        
        /* قائمة المهام */
        #quest-panel { position: absolute; top: 20px; right: 20px; background: rgba(0,0,0,0.7); color: white; padding: 15px; border-radius: 10px; border-right: 5px solid #ffaa00; min-width: 150px; }
        .completed { text-decoration: line-through; color: #888; }

        /* عصا التحكم (Joystick) */
        #joystick-zone { position: absolute; bottom: 50px; left: 50px; width: 120px; height: 120px; background: rgba(255,255,255,0.1); border-radius: 50%; pointer-events: auto; }
        #joystick-stick { position: absolute; width: 50px; height: 50px; background: rgba(255,255,255,0.4); border-radius: 50%; top: 35px; left: 35px; }

        /* زر القفز/التفاعل */
        #action-btn { position: absolute; bottom: 60px; right: 50px; width: 70px; height: 70px; background: rgba(255,170,0,0.6); border-radius: 50%; pointer-events: auto; display: flex; align-items: center; justify-content: center; color: white; font-weight: bold; border: 2px solid white; }
    </style>
</head>
<body>

    <div id="ui-layer">
        <div id="quest-panel">
            <h3>المهام:</h3>
            <div id="task1">• ابحث عن البوابة الرئيسية</div>
            <div id="task2">• ابحث عن مفتاح التشغيل</div>
        </div>
        <div id="joystick-zone"><div id="joystick-stick"></div></div>
        <div id="action-btn">تفاعل</div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <script>
        // --- إعداد المشهد والواقعية ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x0a0a12); // جو ليلي
        scene.fog = new THREE.FogExp2(0x0a0a12, 0.1);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.shadowMap.enabled = true;
        document.body.appendChild(renderer.domElement);

        // --- الإضاءة (سر الواقعية في الليل) ---
        const hemiLight = new THREE.HemisphereLight(0x443333, 0x111122, 1);
        scene.add(hemiLight);

        const spotLight = new THREE.SpotLight(0xffffff, 2);
        spotLight.position.set(0, 10, 0);
        spotLight.castShadow = true;
        spotLight.angle = Math.PI / 4;
        scene.add(spotLight);

        // --- بناء العالم (الميناء المظلم) ---
        const floorGeo = new THREE.PlaneGeometry(200, 200);
        const floorMat = new THREE.MeshStandardMaterial({ color: 0x111111, roughness: 0.8 });
        const floor = new THREE.Mesh(floorGeo, floorMat);
        floor.rotation.x = -Math.PI / 2;
        floor.receiveShadow = true;
        scene.add(floor);

        // إضافة جدران و ممرات (صناديق شحن لزيادة الواقعية)
        function createBox(x, z, color = 0x555555) {
            const geo = new THREE.BoxGeometry(4, 4, 8);
            const mat = new THREE.MeshStandardMaterial({ color: color });
            const box = new THREE.Mesh(geo, mat);
            box.position.set(x, 2, z);
            box.castShadow = true;
            box.receiveShadow = true;
            scene.add(box);
            return box;
        }

        const box1 = createBox(10, -15, 0xaa2222); // حاوية حمراء
        const box2 = createBox(-10, -20, 0x2222aa); // حاوية زرقاء
        const targetGate = createBox(0, -40, 0xffaa00); // البوابة الهدف

        // --- نظام التحكم باللاعب ---
        const player = new THREE.Group();
        player.add(camera);
        player.position.set(0, 2, 10);
        scene.add(player);

        let moveForward = 0, moveRight = 0;
        let rotationY = 0;

        // منطق الجويستيك (مبسط)
        const joyZone = document.getElementById('joystick-zone');
        const joyStick = document.getElementById('joystick-stick');
        
        joyZone.addEventListener('touchmove', (e) => {
            const touch = e.touches[0];
            const rect = joyZone.getBoundingClientRect();
            const x = touch.clientX - rect.left - 60;
            const y = touch.clientY - rect.top - 60;
            
            const dist = Math.sqrt(x*x + y*y);
            const maxDist = 40;
            const angle = Math.atan2(y, x);
            
            const limitedX = Math.cos(angle) * Math.min(dist, maxDist);
            const limitedY = Math.sin(angle) * Math.min(dist, maxDist);
            
            joyStick.style.transform = `translate(${limitedX}px, ${limitedY}px)`;
            
            moveForward = -limitedY / maxDist;
            moveRight = limitedX / maxDist;
        });

        joyZone.addEventListener('touchend', () => {
            joyStick.style.transform = `translate(0px, 0px)`;
            moveForward = 0; moveRight = 0;
        });

        // تحريك الكاميرا باللمس في الجهة اليمنى
        let lastTouchX = 0;
        window.addEventListener('touchmove', (e) => {
            if (e.touches[0].clientX > window.innerWidth / 2) {
                const deltaX = e.touches[0].clientX - lastTouchX;
                player.rotation.y -= deltaX * 0.005;
                lastTouchX = e.touches[0].clientX;
            }
        });
        window.addEventListener('touchstart', (e) => {
            if (e.touches[0].clientX > window.innerWidth / 2) {
                lastTouchX = e.touches[0].clientX;
            }
        });

        // --- حلقة اللعب (Game Loop) ---
        function animate() {
            requestAnimationFrame(animate);

            // تحريك اللاعب بناءً على اتجاه الكاميرا
            const speed = 0.15;
            player.translateZ(-moveForward * speed);
            player.translateX(moveRight * speed);

            // كشف المسافة للمهام
            const distToGate = player.position.distanceTo(targetGate.position);
            if(distToGate < 5) {
                document.getElementById('task1').className = 'completed';
                document.getElementById('task2').innerHTML = '• تم العثور على البوابة! ابحث عن المخرج';
                targetGate.material.color.set(0x00ff00);
            }

            renderer.render(scene, camera);
        }

        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
