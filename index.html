<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>شاشة ترحيب</title>
    <style>
        /* إعدادات الصفحة لضمان تمركز العنصر في المنتصف تماماً */
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            /* تم تغيير الخلفية لألوان جذابة حسب طلبك */
            background: linear-gradient(45deg, #a8edea 0%, #fed6e3 100%); 
            font-family: Arial, sans-serif;
            overflow: hidden; /* لمنع ظهور أشرطة التمرير */
            transition: background 0.5s ease; /* انتقال سلس للون الخلفية */
        }

        /* تنسيق الكلمة وحركتها */
        .welcome-text {
            font-size: 5rem; /* حجم الخط */
            color: #ff0000; /* تم تغيير لون الخط إلى الأحمر */
            font-weight: bold;
            opacity: 0; /* تبدأ مخفية */
            /* استدعاء الحركة: مدتها 4 ثوانٍ وتتوقف عند آخر إطار */
            animation: appearGrowShrink 4s ease-in-out forwards;
        }

        /* تفاصيل الحركة */
        @keyframes appearGrowShrink {
            0% {
                transform: scale(0); /* تبدأ بحجم صفر من المنتصف */
                opacity: 0; /* مخفية تماماً */
            }
            30% {
                transform: scale(1.2); /* تكبر قليلاً عن حجمها الطبيعي */
                opacity: 1; /* تظهر بالكامل */
            }
            70% {
                transform: scale(1.2); /* تبقى على نفس الحجم لفترة لتتمكن من قراءتها */
                opacity: 1;
            }
            100% {
                transform: scale(0); /* تصغر وتعود لنقطة الصفر */
                opacity: 0; /* تختفي مجدداً */
            }
        }

        /* تنسيق الشاشة الثانية والأزرار */
        #main-screen {
            display: none; /* الأزرار مخفية في البداية */
            gap: 30px; /* المسافة بين الزرين */
        }

        .btn {
            padding: 15px 50px;
            font-size: 2rem;
            font-weight: bold;
            color: #fff;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            transition: transform 0.2s, background-color 0.2s;
        }

        /* ألوان الأزرار */
        .btn.send {
            background-color: #28a745; /* لون أخضر للزر إرسال */
        }

        .btn.receive {
            background-color: #007bff; /* لون أزرق للزر استلام */
        }

        /* تأثير عند تمرير الماوس فوق الزر */
        .btn:hover {
            transform: scale(1.05); /* يكبر الزر قليلاً */
        }
    </style>
</head>
<body>

    <div id="welcome-text" class="welcome-text">العافية</div>

    <!-- الشاشة الثانية التي تحتوي على الأزرار -->
    <div id="main-screen">
        <!-- تم ربط زر الإرسال بالدالة الجديدة لفتح صفحة الطلبات -->
        <button class="btn send" onclick="openSendPage()">إرسال</button>
        <button class="btn receive" onclick="window.open('about:blank', '_blank')">استلام</button>
    </div>

    <!-- كود الجافا سكريبت للتحكم بالانتقال وفتح الصفحة الجديدة -->
    <script>
        // ننتظر 4 ثوانٍ (وهي مدة حركة الكلمة) ثم ننفذ الأوامر
        setTimeout(function() {
            // 1. إخفاء كلمة العافية
            document.getElementById('welcome-text').style.display = 'none';
            
            // 2. تغيير لون خلفية الصفحة إلى الأبيض
            document.body.style.background = '#ffffff';
            
            // 3. إظهار الأزرار
            document.getElementById('main-screen').style.display = 'flex';
        }, 4000); // 4000 جزء من الثانية تعني 4 ثوانٍ

        // الميزة الجديدة: دالة لفتح صفحة الإرسال للكاشير
        function openSendPage() {
            // فتح نافذة جديدة
            var sendWindow = window.open('', '_blank');
            
            // تصميم محتوى الصفحة الجديدة الخاص بنظام البندر
            var pageContent = `
            <!DOCTYPE html>
            <html lang="ar" dir="rtl">
            <head>
                <meta charset="UTF-8">
                <meta name="viewport" content="width=device-width, initial-scale=1.0">
                <title>البندر - صفحة الكاشير (إرسال)</title>
                <style>
                    body {
                        font-family: Arial, sans-serif;
                        background-color: #f4f7f6;
                        margin: 0;
                        padding: 20px;
                        display: flex;
                        justify-content: center;
                    }
                    .order-container {
                        background-color: #ffffff;
                        width: 100%;
                        max-width: 500px;
                        padding: 30px;
                        border-radius: 12px;
                        box-shadow: 0 5px 15px rgba(0,0,0,0.05);
                    }
                    h2 {
                        text-align: center;
                        color: #333;
                        margin-bottom: 30px;
                        border-bottom: 2px solid #28a745;
                        padding-bottom: 10px;
                    }
                    .item-row {
                        display: flex;
                        justify-content: space-between;
                        align-items: center;
                        padding: 15px 0;
                        border-bottom: 1px solid #eee;
                    }
                    .item-name {
                        font-size: 1.3rem;
                        font-weight: bold;
                        color: #444;
                    }
                    .quantity-box {
                        display: flex;
                        align-items: center;
                        gap: 10px;
                    }
                    .quantity-box label {
                        font-size: 1.1rem;
                        color: #666;
                    }
                    .quantity-box input {
                        width: 60px;
                        padding: 8px;
                        font-size: 1.1rem;
                        text-align: center;
                        border: 1px solid #ccc;
                        border-radius: 6px;
                    }
                    .notes-section {
                        margin-top: 25px;
                    }
                    .notes-section label {
                        display: block;
                        font-size: 1.1rem;
                        font-weight: bold;
                        color: #444;
                        margin-bottom: 10px;
                    }
                    .notes-section textarea {
                        width: 100%;
                        height: 100px;
                        padding: 12px;
                        font-size: 1rem;
                        border: 1px solid #ccc;
                        border-radius: 8px;
                        resize: vertical;
                        box-sizing: border-box;
                        font-family: Arial, sans-serif;
                    }
                    .submit-btn {
                        width: 100%;
                        background-color: #28a745;
                        color: #fff;
                        border: none;
                        padding: 15px;
                        font-size: 1.3rem;
                        font-weight: bold;
                        border-radius: 8px;
                        margin-top: 25px;
                        cursor: pointer;
                        transition: background-color 0.3s;
                    }
                    .submit-btn:hover {
                        background-color: #218838;
                    }
                </style>
            </head>
            <body>
                <div class="order-container">
                    <h2>إرسال طلب جديد</h2>
                    
                    <div class="item-row">
                        <div class="item-name">طبق عادي</div>
                        <div class="quantity-box">
                            <label>العدد:</label>
                            <input type="number" min="0" value="0">
                        </div>
                    </div>
                    
                    <div class="item-row">
                        <div class="item-name">طبق فنكر</div>
                        <div class="quantity-box">
                            <label>العدد:</label>
                            <input type="number" min="0" value="0">
                        </div>
                    </div>

                    <div class="notes-section">
                        <label>ملاحظات الطلب:</label>
                        <textarea placeholder="مثال: بدون طماطة، أو بدون طرشي..."></textarea>
                    </div>

                    <button class="submit-btn" onclick="alert('تم تسجيل الطلب بنجاح!')">إرسال الطلب</button>
                </div>
            </body>
            </html>
            `;
            
            // كتابة المحتوى في النافذة الجديدة
            sendWindow.document.write(pageContent);
            sendWindow.document.close();
        }
    </script>

</body>
</html>
