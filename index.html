<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>فطومه 🌹</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Tajawal', sans-serif;
    background: #0a0010;
    overflow: hidden;
    height: 100vh;
    width: 100vw;
    position: relative;
    transition: background 1s ease;
  }

  /* ===== RAIN OF ROSES ===== */
  .rose-rain {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    z-index: 1;
  }

  .falling-rose {
    position: absolute;
    top: -80px;
    font-size: 2rem;
    animation: fall linear infinite;
    opacity: 0.85;
  }

  @keyframes fall {
    0%   { transform: translateY(-80px) rotate(0deg); opacity: 0; }
    10%  { opacity: 1; }
    90%  { opacity: 0.8; }
    100% { transform: translateY(110vh) rotate(360deg); opacity: 0; }
  }

  /* ===== SCREENS ===== */
  .screen {
    position: fixed;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 10;
    transition: opacity 0.6s ease, transform 0.6s ease;
  }

  .screen.hidden {
    opacity: 0;
    pointer-events: none;
    transform: scale(0.95);
  }

  /* ===== SCREEN 1 ===== */
  #screen1 {
    background: radial-gradient(ellipse at center, #1a0025 0%, #0a0010 70%);
  }

  .glow-text {
    font-size: clamp(2.2rem, 6vw, 4rem);
    font-weight: 900;
    color: #fff;
    text-shadow: 0 0 20px #ff6b9d, 0 0 40px #ff4488, 0 0 80px #cc0055;
    margin-bottom: 50px;
    text-align: center;
    animation: pulse 2s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { text-shadow: 0 0 20px #ff6b9d, 0 0 40px #ff4488, 0 0 80px #cc0055; }
    50%       { text-shadow: 0 0 30px #ff9dbe, 0 0 60px #ff6699, 0 0 120px #ff0066; }
  }

  .btn-main {
    background: linear-gradient(135deg, #ff2d7a, #c2006a);
    color: white;
    border: none;
    padding: 22px 60px;
    font-size: 1.5rem;
    font-weight: 700;
    border-radius: 50px;
    cursor: pointer;
    box-shadow: 0 0 30px #ff2d7a88;
    transition: transform 0.2s;
    z-index: 2;
  }

  /* ===== SCREEN 2 ===== */
  .question-text {
    font-size: clamp(2.5rem, 7vw, 5rem);
    font-weight: 900;
    color: #fff;
    text-align: center;
    text-shadow: 0 0 30px #ff6b9d;
    margin-bottom: 60px;
  }

  .btn-row {
    display: flex;
    gap: 30px;
    justify-content: center;
    width: 100%;
  }

  .btn-yes {
    background: linear-gradient(135deg, #ff2d7a, #c2006a);
    color: white;
    border: none;
    padding: 20px 55px;
    font-size: 1.6rem;
    font-weight: 700;
    border-radius: 50px;
    cursor: pointer;
  }

  .btn-no {
    background: transparent;
    color: #ff6b9d;
    border: 2px solid #ff6b9d;
    padding: 20px 55px;
    font-size: 1.6rem;
    font-weight: 700;
    border-radius: 50px;
    cursor: pointer;
    transition: all 0.2s ease;
  }

  /* ===== RESULT SCREEN ===== */
  #screen3 {
    justify-content: flex-start;
    padding-top: 18vh;
  }

  .result-text {
    font-size: clamp(1.8rem, 5vw, 3.5rem);
    font-weight: 900;
    color: #fff;
    text-align: center;
    text-shadow: 0 0 20px #ff6b9d;
    line-height: 1.4;
    white-space: pre-line;
    z-index: 100;
  }

  /* زر الإعادة الجديد (أعلى يمين) */
  .btn-restart {
    position: fixed;
    top: 20px;
    right: 20px;
    background: rgba(255, 107, 157, 0.2);
    color: #fff;
    border: 1px solid rgba(255, 107, 157, 0.5);
    width: 50px;
    height: 50px;
    font-size: 1.5rem;
    border-radius: 50%;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.3s ease;
    opacity: 0; /* مخفي في البداية */
    pointer-events: none;
    z-index: 200;
  }

  .btn-restart.visible {
    opacity: 1;
    pointer-events: auto;
  }

  .btn-restart:hover {
    background: rgba(255, 107, 157, 0.4);
    transform: rotate(180deg);
  }

  /* ===== BIG ROSE ===== */
  .big-rose {
    position: fixed;
    bottom: -120px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 7rem;
    z-index: 91; 
    pointer-events: none;
    filter: drop-shadow(0 0 40px #ff2d7a);
    animation: riseUp 2.5s cubic-bezier(0.22, 1, 0.36, 1) forwards;
  }

  @keyframes riseUp {
    0%   { bottom: -120px; opacity: 0; transform: translateX(-50%) scale(0.5); }
    100% { bottom: 2vh; opacity: 1; transform: translateX(-50%) scale(1); }
  }

  .heart-burst {
    position: fixed;
    pointer-events: none;
    z-index: 200;
    animation: heartFly 1.5s ease-out forwards;
  }

  @keyframes heartFly {
    0%   { opacity: 1; transform: translate(0,0) scale(0.5); }
    100% { opacity: 0; transform: translate(var(--dx), var(--dy)) scale(1.5); }
  }

  .stars { position: fixed; inset: 0; z-index: 0; }
  .star { position: absolute; border-radius: 50%; background: white; animation: twinkle ease-in-out infinite; }
  @keyframes twinkle { 0%, 100% { opacity: 0.1; } 50% { opacity: 0.9; } }
</style>
</head>
<body>

<audio id="bgMusic" loop>
  <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
</audio>

<div class="stars" id="stars"></div>
<div class="rose-rain" id="roseRain"></div>

<button class="btn-restart" id="restartBtn" onclick="restart()">🔄</button>

<div class="screen" id="screen1">
  <div class="glow-text">أنتِ فطومه؟ 🌹</div>
  <button class="btn-main" onclick="startApp()">نعم، أنا فطومه 💕</button>
</div>

<div class="screen hidden" id="screen2">
  <div class="question-text">تحبيني؟</div>
  <div class="btn-row">
    <button class="btn-yes" onclick="answerYes()">آي 💖</button>
    <button class="btn-no" id="noBtn" onmouseover="moveButton()">لا 😢</button>
  </div>
</div>

<div class="screen hidden" id="screen3">
  <div class="result-text" id="resultText"></div>
</div>

<script>
  /* ===== STARS & RAIN ===== */
  const starsEl = document.getElementById('stars');
  for (let i = 0; i < 100; i++) {
    const s = document.createElement('div');
    s.className = 'star';
    const size = Math.random() * 2;
    s.style.cssText = `width:${size}px; height:${size}px; left:${Math.random()*100}%; top:${Math.random()*100}%; animation-duration:${2+Math.random()*3}s;`;
    starsEl.appendChild(s);
  }

  const roseContainer = document.getElementById('roseRain');
  function spawnRose() {
    const r = document.createElement('div');
    r.className = 'falling-rose';
    r.textContent = '🌹';
    r.style.left = Math.random()*100 + 'vw';
    const dur = 4 + Math.random()*5;
    r.style.animationDuration = dur + 's';
    roseContainer.appendChild(r);
    setTimeout(() => r.remove(), dur * 1000);
  }
  setInterval(spawnRose, 400);

  /* ===== LOGIC ===== */
  function startApp() {
    document.getElementById('bgMusic').play().catch(() => {});
    transition('screen1', 'screen2');
  }

  function moveButton() {
    const btn = document.getElementById('noBtn');
    btn.style.position = 'fixed';
    btn.style.left = Math.random() * (window.innerWidth - 100) + 'px';
    btn.style.top = Math.random() * (window.innerHeight - 50) + 'px';
  }

  function transition(from, to) {
    document.getElementById(from).classList.add('hidden');
    setTimeout(() => document.getElementById(to).classList.remove('hidden'), 300);
  }

  function typeWriter(text, i, callback) {
    if (i < text.length) {
      document.getElementById('resultText').innerHTML += text.charAt(i);
      setTimeout(() => typeWriter(text, i + 1, callback), 100);
    } else if (callback) callback();
  }

  function answerYes() {
    document.body.style.background = "#2a0010";
    transition('screen2', 'screen3');
    setTimeout(() => {
      typeWriter('أعرف إنك تحبيني 💖\nوأنا أحبك أكثر 🌹', 0, () => {
        document.getElementById('restartBtn').classList.add('visible');
      });
      spawnBigRose();
      burstHearts();
    }, 600);
  }

  function spawnBigRose() {
    const r = document.createElement('div');
    r.className = 'big-rose';
    r.textContent = '🌹';
    document.body.appendChild(r);
  }

  function burstHearts() {
    const cx = window.innerWidth / 2, cy = window.innerHeight / 2;
    for (let i = 0; i < 15; i++) {
      const h = document.createElement('div');
      h.className = 'heart-burst';
      h.textContent = '💖';
      const angle = Math.random() * Math.PI * 2, dist = 100 + Math.random() * 150;
      h.style.left = cx + 'px'; h.style.top = cy + 'px';
      h.style.setProperty('--dx', Math.cos(angle)*dist + 'px');
      h.style.setProperty('--dy', Math.sin(angle)*dist + 'px');
      document.body.appendChild(h);
      setTimeout(() => h.remove(), 1500);
    }
  }

  function restart() { window.location.reload(); }
</script>
</body>
</html>
