<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>فطومه 🌹</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Tajawal', sans-serif;
    background: #0a0010;
    overflow: hidden;
    height: 100vh;
    width: 100vw;
    position: relative;
    transition: background 1s ease;
    /* تحسين سلاسة الحركة في الصفحة كاملة */
    backface-visibility: hidden;
    -webkit-font-smoothing: antialiased;
  }

  /* ===== RAIN OF ROSES (Optimized for High FPS) ===== */
  .rose-rain {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    z-index: 1;
  }

  .falling-rose {
    position: absolute;
    top: -80px;
    font-size: 2rem;
    animation: fall linear infinite;
    opacity: 0.85;
    /* تفعيل تسريع العتاد GPU */
    will-change: transform;
    transform: translate3d(0, 0, 0);
  }

  @keyframes fall {
    0%   { transform: translate3d(0, -80px, 0) rotate(0deg); opacity: 0; }
    10%  { opacity: 1; }
    90%  { opacity: 0.8; }
    100% { transform: translate3d(0, 110vh, 0) rotate(360deg); opacity: 0; }
  }

  /* ===== SCREENS ===== */
  .screen {
    position: fixed;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 10;
    transition: opacity 0.6s cubic-bezier(0.4, 0, 0.2, 1), transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
    will-change: opacity, transform;
  }

  .screen.hidden {
    opacity: 0;
    pointer-events: none;
    transform: scale(0.95) translate3d(0,0,0);
  }

  /* ===== SCREEN 1 ===== */
  #screen1 {
    background: radial-gradient(ellipse at center, #1a0025 0%, #0a0010 70%);
  }

  .glow-text {
    font-size: clamp(2.2rem, 6vw, 4rem);
    font-weight: 900;
    color: #fff;
    text-shadow: 0 0 20px #ff6b9d, 0 0 40px #ff4488, 0 0 80px #cc0055;
    margin-bottom: 50px;
    text-align: center;
    letter-spacing: 2px;
    animation: pulse 2s ease-in-out infinite;
    will-change: text-shadow;
  }

  @keyframes pulse {
    0%, 100% { text-shadow: 0 0 20px #ff6b9d, 0 0 40px #ff4488, 0 0 80px #cc0055; }
    50%       { text-shadow: 0 0 30px #ff9dbe, 0 0 60px #ff6699, 0 0 120px #ff0066; }
  }

  .btn-main {
    background: linear-gradient(135deg, #ff2d7a, #c2006a);
    color: white;
    border: none;
    padding: 22px 60px;
    font-size: 1.5rem;
    font-family: 'Tajawal', sans-serif;
    font-weight: 700;
    border-radius: 50px;
    cursor: pointer;
    box-shadow: 0 0 30px #ff2d7a88, 0 8px 32px #00000088;
    transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275), box-shadow 0.2s;
    position: relative;
    z-index: 2;
    will-change: transform;
  }

  .btn-main:hover {
    transform: translate3d(0, -4px, 0) scale(1.04);
    box-shadow: 0 0 50px #ff2d7aaa, 0 12px 40px #00000099;
  }

  /* ===== SCREEN 2 ===== */
  #screen2 {
    background: radial-gradient(ellipse at center, #1a0020 0%, #0a0010 70%);
  }

  .question-text {
    font-size: clamp(2.5rem, 7vw, 5rem);
    font-weight: 900;
    color: #fff;
    text-align: center;
    text-shadow: 0 0 30px #ff6b9d, 0 0 60px #ff2d7a;
    margin-bottom: 60px;
    animation: pulse 2s ease-in-out infinite;
  }

  .btn-row {
    display: flex;
    gap: 30px;
    flex-wrap: wrap;
    justify-content: center;
    width: 100%;
    position: relative;
  }

  .btn-yes {
    background: linear-gradient(135deg, #ff2d7a, #c2006a);
    color: white;
    border: none;
    padding: 20px 55px;
    font-size: 1.6rem;
    font-family: 'Tajawal', sans-serif;
    font-weight: 700;
    border-radius: 50px;
    cursor: pointer;
    box-shadow: 0 0 30px #ff2d7a88;
    transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    z-index: 100;
  }

  .btn-no {
    background: transparent;
    color: #ff6b9d;
    border: 2px solid #ff6b9d;
    padding: 20px 55px;
    font-size: 1.6rem;
    font-weight: 700;
    border-radius: 50px;
    cursor: pointer;
    transition: all 0.3s cubic-bezier(0.19, 1, 0.22, 1);
    z-index: 100;
    will-change: left, top;
  }

  /* ===== BIG ROSE ANIMATION ===== */
  .big-rose {
    position: fixed;
    bottom: -120px;
    left: 50%;
    transform: translate3d(-50%, 0, 0);
    font-size: 7rem;
    z-index: 91; 
    pointer-events: none;
    filter: drop-shadow(0 0 40px #ff2d7a);
    animation: riseUp 2.5s cubic-bezier(0.22, 1, 0.36, 1) forwards;
    will-change: bottom, transform;
  }

  @keyframes riseUp {
    0%   { bottom: -120px; opacity: 0; transform: translate3d(-50%, 0, 0) scale(0.5) rotate(-15deg); }
    30%  { opacity: 1; }
    70%  { transform: translate3d(-50%, 0, 0) scale(1.1) rotate(5deg); }
    100% { bottom: 2vh; opacity: 1; transform: translate3d(-50%, 0, 0) scale(1) rotate(0deg); }
  }

  /* ===== RESULT SCREEN ===== */
  #screen3 {
    z-index: 90;
    justify-content: flex-start;
    padding-top: 18vh;
  }

  .result-text {
    font-size: clamp(1.8rem, 5vw, 3.5rem);
    font-weight: 900;
    color: #fff;
    text-align: center;
    text-shadow: 0 0 20px #ff6b9d, 0 0 50px #ff2d7a;
    padding: 0 20px;
    line-height: 1.4;
    margin-bottom: 40px;
    white-space: pre-line;
    position: relative;
    z-index: 100;
    min-height: 150px;
  }

  .btn-restart {
    background: transparent;
    color: #ff6b9d;
    border: 2px solid #ff6b9d;
    padding: 14px 40px;
    font-size: 1.2rem;
    font-weight: 700;
    border-radius: 50px;
    cursor: pointer;
    transition: all 0.3s ease;
    opacity: 0;
    position: relative;
    z-index: 100;
    will-change: opacity;
  }

  .btn-restart.visible {
    animation: fadeIn 1s ease forwards;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translate3d(0, 10px, 0); }
    to { opacity: 1; transform: translate3d(0, 0, 0); }
  }

  /* ===== HEART PARTICLES ===== */
  .heart-burst {
    position: fixed;
    pointer-events: none;
    z-index: 200;
    font-size: 2rem;
    animation: heartFly 1.5s cubic-bezier(0.165, 0.84, 0.44, 1) forwards;
    will-change: transform, opacity;
  }

  @keyframes heartFly {
    0%   { opacity: 1; transform: translate3d(0,0,0) scale(0.5); }
    100% { opacity: 0; transform: translate3d(var(--dx), var(--dy), 0) scale(1.5); }
  }

  /* ===== STARS BACKGROUND ===== */
  .stars {
    position: fixed;
    inset: 0;
    z-index: 0;
    pointer-events: none;
  }

  .star {
    position: absolute;
    border-radius: 50%;
    background: white;
    animation: twinkle ease-in-out infinite;
    will-change: opacity;
  }

  @keyframes twinkle {
    0%, 100% { opacity: 0.1; transform: scale(1); }
    50%       { opacity: 0.9; transform: scale(1.2); }
  }
</style>
</head>
<body>

<audio id="bgMusic" loop>
  <source src="https://server11.mp3quran.net/s_gmd/001.mp3" type="audio/mpeg">
  </audio>

<div class="stars" id="stars"></div>
<div class="rose-rain" id="roseRain"></div>

<div class="screen" id="screen1">
  <div class="glow-text">أنتِ فطومه؟ 🌹</div>
  <button class="btn-main" onclick="startApp()">نعم، أنا فطومه 💕</button>
</div>

<div class="screen hidden" id="screen2">
  <div class="question-text">تحبيني؟</div>
  <div class="btn-row">
    <button class="btn-yes" onclick="answerYes()">آي 💖</button>
    <button class="btn-no" id="noBtn" onmouseover="moveButton()" onclick="moveButton()" ontouchstart="moveButton()">لا 😢</button>
  </div>
</div>

<div class="screen hidden" id="screen3">
  <div class="result-text" id="resultText"></div>
  <button class="btn-restart" id="restartBtn" onclick="restart()">إعادة من جديد 🔄</button>
</div>

<script>
  /* ===== STARS ===== */
  const starsEl = document.getElementById('stars');
  for (let i = 0; i < 80; i++) {
    const s = document.createElement('div');
    s.className = 'star';
    const size = Math.random() * 2 + 0.5;
    s.style.cssText = `
      width:${size}px; height:${size}px;
      left:${Math.random()*100}%;
      top:${Math.random()*100}%;
      animation-duration:${2+Math.random()*4}s;
      animation-delay:${Math.random()*4}s;
    `;
    starsEl.appendChild(s);
  }

  /* ===== FALLING ROSES (Optimized SPAWN) ===== */
  const roseContainer = document.getElementById('roseRain');
  const roseEmojis = ['🌹','🌸','🌺','💐','🌷'];

  function spawnRose() {
    const r = document.createElement('div');
    r.className = 'falling-rose';
    r.textContent = roseEmojis[Math.floor(Math.random()*roseEmojis.length)];
    r.style.left = Math.random()*100 + 'vw';
    r.style.fontSize = (1.2 + Math.random()*1.8) + 'rem';
    const dur = 5 + Math.random()*5;
    r.style.animationDuration = dur + 's';
    roseContainer.appendChild(r);
    // تنظيف العناصر لتقليل استهلاك الذاكرة
    setTimeout(() => r.remove(), dur * 1000);
  }

  setInterval(spawnRose, 400);

  /* ===== APP START ===== */
  function startApp() {
    const audio = document.getElementById('bgMusic');
    // محاولة تشغيل الأغنية من الثانية 10 (اختياري للوصول للمقطع المطلوب)
    audio.currentTime = 5; 
    audio.play().catch(e => console.log("المتصفح يطلب تفاعل المستخدم للموسيقى"));
    transition('screen1', 'screen2');
  }

  /* ===== SMOOTH RUNAWAY BUTTON ===== */
  function moveButton() {
    const btn = document.getElementById('noBtn');
    const padding = 50;
    const x = Math.random() * (window.innerWidth - btn.offsetWidth - padding);
    const y = Math.random() * (window.innerHeight - btn.offsetHeight - padding);
    
    btn.style.position = 'fixed';
    btn.style.left = x + 'px';
    btn.style.top = y + 'px';
  }

  /* ===== TYPEWRITER EFFECT ===== */
  function typeWriter(text, i, callback) {
    if (i < text.length) {
      document.getElementById('resultText').innerHTML += text.charAt(i);
      setTimeout(() => typeWriter(text, i + 1, callback), 80);
    } else if (callback) {
      callback();
    }
  }

  /* ===== NAVIGATION ===== */
  function transition(from, to) {
    document.getElementById(from).classList.add('hidden');
    setTimeout(() => {
        document.getElementById(to).classList.remove('hidden');
    }, 400);
  }

  /* ===== YES ===== */
  function answerYes() {
    document.body.style.background = "radial-gradient(ellipse at center, #4a001a 0%, #0a0010 70%)";
    transition('screen2', 'screen3');
    
    setTimeout(() => {
      typeWriter('أعرف إنك تحبيني 💖\nومهما ومهما صار.. أنتِ حبي 🌹', 0, () => {
        document.getElementById('restartBtn').classList.add('visible');
      });
      spawnBigRose('🌹');
      burstHearts();
    }, 800);
  }

  /* ===== BIG ROSE ===== */
  function spawnBigRose(emoji) {
    const r = document.createElement('div');
    r.className = 'big-rose';
    r.textContent = emoji;
    document.body.appendChild(r);
  }

  /* ===== HEART BURST (High Perf) ===== */
  function burstHearts() {
    const cx = window.innerWidth / 2;
    const cy = window.innerHeight / 2;
    const hearts = ['💖','💗','💓','💞','💕','❤️'];
    const count = 20;
    
    for (let i = 0; i < count; i++) {
      const h = document.createElement('div');
      h.className = 'heart-burst';
      h.textContent = hearts[Math.floor(Math.random()*hearts.length)];
      const angle = Math.random() * Math.PI * 2;
      const dist = 100 + Math.random() * 200;
      
      h.style.left = cx + 'px';
      h.style.top = cy + 'px';
      h.style.setProperty('--dx', Math.cos(angle)*dist + 'px');
      h.style.setProperty('--dy', Math.sin(angle)*dist + 'px');
      h.style.fontSize = (1.5 + Math.random()*2) + 'rem';
      
      document.body.appendChild(h);
      setTimeout(() => h.remove(), 1500);
    }
  }

  function restart() {
    window.location.reload();
  }
</script>
</body>
</html>
