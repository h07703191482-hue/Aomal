<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>أبواب الأبدية 3D</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; font-family: sans-serif; }
        canvas { display: block; }
        #ui {
            position: absolute;
            top: 20px;
            width: 100%;
            display: flex;
            justify-content: space-between;
            pointer-events: none;
            padding: 0 40px;
            box-sizing: border-box;
            text-shadow: 2px 2px 4px #000;
        }
        .panel {
            background: rgba(0, 0, 0, 0.7);
            padding: 15px;
            border: 2px solid #d35400;
            border-radius: 8px;
            color: white;
            font-size: 1.2em;
            font-weight: bold;
        }
        .hp { color: #2ecc71; }
        .ash { color: #e74c3c; }
        .boss-hp { color: #9b59b6; }
        #message {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            font-size: 3em;
            font-weight: bold;
            display: none;
            text-shadow: 2px 2px 10px red;
        }
    </style>
</head>
<body>

    <div id="ui">
        <div class="panel">
            كايل (اللاعب)<br>
            <span class="hp">صحة: <span id="player-hp">100</span></span><br>
            <span class="ash">رماد: <span id="player-ash">0</span>%</span>
        </div>
        <div class="panel text-left" style="text-align: left;">
            الحارس النحاسي (الزعيم)<br>
            <span class="boss-hp">صحة: <span id="boss-hp">200</span></span>
        </div>
    </div>
    <div id="message">لقد انتصرت!</div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <script>
        // إعدادات اللعبة
        let playerStats = { hp: 100, ash: 0 };
        let bossStats = { hp: 200 };
        let isGameOver = false;

        // إعداد المشهد 3D (Scene)
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x1a1a1a);
        scene.fog = new THREE.Fog(0x1a1a1a, 10, 50);

        // الكاميرا
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 8, 12);
        camera.lookAt(0, 0, 0);

        // الريندر (Renderer)
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        document.body.appendChild(renderer.domElement);

        // الإضاءة
        const ambientLight = new THREE.AmbientLight(0x404040); // نور خافت
        scene.add(ambientLight);

        const pointLight = new THREE.PointLight(0xff5500, 1.5, 50);
        pointLight.position.set(0, 10, 0);
        pointLight.castShadow = true;
        scene.add(pointLight);

        // الأرضية
        const floorGeo = new THREE.PlaneGeometry(50, 50);
        const floorMat = new THREE.MeshStandardMaterial({ color: 0x333333, roughness: 0.8 });
        const floor = new THREE.Mesh(floorGeo, floorMat);
        floor.rotation.x = -Math.PI / 2;
        floor.receiveShadow = true;
        scene.add(floor);

        // اللاعب (مكعب أزرق)
        const playerGeo = new THREE.BoxGeometry(1, 2, 1);
        const playerMat = new THREE.MeshStandardMaterial({ color: 0x2980b9 });
        const player = new THREE.Mesh(playerGeo, playerMat);
        player.position.y = 1;
        player.castShadow = true;
        scene.add(player);

        // الزعيم (مكعب أحمر ضخم)
        const bossGeo = new THREE.BoxGeometry(3, 4, 3);
        const bossMat = new THREE.MeshStandardMaterial({ color: 0xc0392b });
        const boss = new THREE.Mesh(bossGeo, bossMat);
        boss.position.set(0, 2, -5);
        boss.castShadow = true;
        scene.add(boss);

        // مفاتيح التحكم
        const keys = { w: false, a: false, s: false, d: false };
        
        window.addEventListener('keydown', (e) => {
            if(e.key.toLowerCase() in keys) keys[e.key.toLowerCase()] = true;
            
            // الهجوم (مسافة)
            if(e.key === ' ' && !isGameOver) {
                attackBoss();
            }
        });

        window.addEventListener('keyup', (e) => {
            if(e.key.toLowerCase() in keys) keys[e.key.toLowerCase()] = false;
        });

        // دالة الهجوم
        function attackBoss() {
            // حساب المسافة بين اللاعب والزعيم
            const distance = player.position.distanceTo(boss.position);
            
            if(distance < 4) { // إذا كان قريباً بما يكفي
                bossStats.hp -= 15;
                playerStats.ash += 10;
                
                // تأثير بصري (وميض أبيض للزعيم)
                boss.material.color.setHex(0xffffff);
                setTimeout(() => boss.material.color.setHex(0xc0392b), 100);

                updateUI();

                if(bossStats.hp <= 0) {
                    bossStats.hp = 0;
                    isGameOver = true;
                    scene.remove(boss); // إخفاء الزعيم
                    document.getElementById('message').style.display = 'block';
                }
            }
        }

        // تحديث الواجهة
        function updateUI() {
            document.getElementById('player-hp').innerText = playerStats.hp;
            document.getElementById('player-ash').innerText = playerStats.ash;
            document.getElementById('boss-hp').innerText = bossStats.hp;
        }

        // حركة اللعبة والتحديث المستمر (Game Loop)
        const speed = 0.15;
        function animate() {
            requestAnimationFrame(animate);

            if (!isGameOver) {
                // حركة اللاعب
                if (keys.w) player.position.z -= speed;
                if (keys.s) player.position.z += speed;
                if (keys.a) player.position.x -= speed;
                if (keys.d) player.position.x += speed;

                // جعل الكاميرا تتبع اللاعب برفق
                camera.position.x += (player.position.x - camera.position.x) * 0.05;
                camera.position.z += (player.position.z + 10 - camera.position.z) * 0.05;
                camera.lookAt(player.position);

                // حركة بسيطة للزعيم (دوران)
                boss.rotation.y += 0.01;
            }

            renderer.render(scene, camera);
        }

        // ضبط حجم الشاشة عند التكبير/التصغير
        window.addEventListener('resize', () => {
            renderer.setSize(window.innerWidth, window.innerHeight);
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
        });

        // بدء اللعبة
        updateUI();
        animate();
    </script>
</body>
</html>
