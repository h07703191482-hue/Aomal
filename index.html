<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AL-BANDAR: SHADOWS OF THE PORT</title>
    <style>
        :root { --main: #ffcc00; --dark: #0a0a0a; }
        body { margin: 0; background: #000; font-family: sans-serif; overflow: hidden; touch-action: none; }
        
        /* شاشة الدخول الاحترافية */
        #login-screen { position: fixed; inset: 0; z-index: 100; background: radial-gradient(circle, #222 0%, #000 100%); display: flex; align-items: center; justify-content: center; transition: 0.5s; }
        .login-box { background: rgba(255,255,255,0.05); backdrop-filter: blur(10px); padding: 40px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.1); text-align: center; width: 85%; }
        input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: none; background: rgba(255,255,255,0.1); color: #fff; text-align: center; }
        .btn-play { background: var(--main); color: #000; border: none; padding: 15px 40px; border-radius: 10px; font-weight: bold; width: 100%; cursor: pointer; }

        /* واجهة المهام */
        #game-ui { position: absolute; top: 20px; right: 20px; color: white; display: none; pointer-events: none; }
        #quest-box { background: rgba(0,0,0,0.6); padding: 10px 20px; border-right: 4px solid var(--main); }

        /* التحكم (الجوستيك) */
        #joystick-base { position: absolute; bottom: 50px; left: 50px; width: 100px; height: 100px; background: rgba(255,255,255,0.1); border-radius: 50%; display: none; }
        #joystick-stick { position: absolute; width: 40px; height: 40px; background: rgba(255,255,255,0.3); border-radius: 50%; top: 30px; left: 30px; }
    </style>
</head>
<body>

    <div id="login-screen">
        <div class="login-box">
            <h1 style="color: var(--main); margin-bottom: 5px;">AL-BANDAR</h1>
            <p style="color: #888; font-size: 14px; margin-bottom: 25px;">Shadows of the Port</p>
            <input type="text" id="p-name" placeholder="ادخل اسم اللاعب">
            <button class="btn-play" onclick="startStory()">ابدأ القصة</button>
            <p style="font-size: 10px; color: #555; margin-top: 15px;">Version 1.0.2 - Alpha Test</p>
        </div>
    </div>

    <div id="game-ui">
        <div id="quest-box">
            <small>المهمة الحالية:</small>
            <div id="task-desc">تسلل إلى المستودع الخلفي (0/1)</div>
        </div>
    </div>

    <div id="joystick-base"><div id="joystick-stick"></div></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <script>
        let scene, camera, renderer, player, move = { f: 0, r: 0 };
        
        function startStory() {
            document.getElementById('login-screen').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('game-ui').style.display = 'block';
                document.getElementById('joystick-base').style.display = 'block';
                initGame();
            }, 500);
        }

        function initGame() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x020205);
            scene.fog = new THREE.FogExp2(0x020205, 0.1);

            camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.shadowMap.enabled = true;
            document.body.appendChild(renderer.domElement);

            // إضاءة سينمائية للميناء
            const ambient = new THREE.AmbientLight(0x404040, 0.6);
            scene.add(ambient);

            const moonLight = new THREE.DirectionalLight(0x2244ff, 0.8);
            moonLight.position.set(10, 20, 10);
            scene.add(moonLight);

            // الأرضية (أسفلت الميناء)
            const floor = new THREE.Mesh(
                new THREE.PlaneGeometry(200, 200),
                new THREE.MeshStandardMaterial({ color: 0x111111, roughness: 0.2 })
            );
            floor.rotation.x = -Math.PI/2;
            floor.receiveShadow = true;
            scene.add(floor);

            // إضافة حاويات (Containers) لزيادة الواقعية
            for(let i=0; i<15; i++) {
                const colors = [0xaa2222, 0x2222aa, 0x22aa22];
                const box = new THREE.Mesh(
                    new THREE.BoxGeometry(4, 4, 10),
                    new THREE.MeshStandardMaterial({ color: colors[i%3] })
                );
                box.position.set(Math.random()*40-20, 2, Math.random()*-60 - 10);
                box.castShadow = true;
                scene.add(box);
            }

            player = new THREE.Group();
            player.add(camera);
            player.position.set(0, 1.7, 5);
            scene.add(player);

            setupControls();
            animate();
        }

        function setupControls() {
            const base = document.getElementById('joystick-base');
            const stick = document.getElementById('joystick-stick');
            
            base.addEventListener('touchmove', (e) => {
                const t = e.touches[0];
                const rect = base.getBoundingClientRect();
                const x = t.clientX - rect.left - 50;
                const y = t.clientY - rect.top - 50;
                const dist = Math.min(Math.sqrt(x*x + y*y), 40);
                const angle = Math.atan2(y, x);
                
                stick.style.transform = `translate(${Math.cos(angle)*dist}px, ${Math.sin(angle)*dist}px)`;
                move.f = -Math.sin(angle) * (dist/40);
                move.r = Math.cos(angle) * (dist/40);
            });

            base.addEventListener('touchend', () => {
                stick.style.transform = 'translate(0,0)';
                move = { f:0, r:0 };
            });

            // تدوير الكاميرا
            let lastX = 0;
            window.addEventListener('touchmove', (e) => {
                if(e.touches[0].clientX > window.innerWidth/2) {
                    let dx = e.touches[0].clientX - lastX;
                    player.rotation.y -= dx * 0.01;
                    lastX = e.touches[0].clientX;
                }
            });
            window.addEventListener('touchstart', (e) => {
                if(e.touches[0].clientX > window.innerWidth/2) lastX = e.touches[0].clientX;
            });
        }

        function animate() {
            requestAnimationFrame(animate);
            const speed = 0.15;
            player.translateZ(-move.f * speed);
            player.translateX(move.r * speed);
            renderer.render(scene, camera);
        }
    </script>
</body>
</html>
