<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>فطومه 🌹</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Tajawal', sans-serif;
    background: #0a0010;
    overflow: hidden;
    height: 100vh;
    width: 100vw;
    position: relative;
    transition: background 1s ease;
    backface-visibility: hidden;
    -webkit-font-smoothing: antialiased;
  }

  /* ===== RAIN OF ROSES & WORDS ===== */
  .rose-rain {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    z-index: 1;
  }

  .falling-rose, .falling-word {
    position: absolute;
    top: -100px;
    animation: fall linear infinite;
    will-change: transform;
    transform: translate3d(0, 0, 0);
  }

  .falling-rose { font-size: 2rem; opacity: 0.85; }

  .falling-word {
    color: #ff6b9d;
    font-weight: 700;
    white-space: nowrap;
    text-shadow: 0 0 10px rgba(255, 107, 157, 0.5);
    font-size: 1.5rem;
  }

  @keyframes fall {
    0%   { transform: translate3d(0, -100px, 0) rotate(0deg); opacity: 0; }
    10%  { opacity: 1; }
    90%  { opacity: 0.8; }
    100% { transform: translate3d(0, 110vh, 0) rotate(360deg); opacity: 0; }
  }

  /* ===== SCREENS ===== */
  .screen {
    position: fixed;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 10;
    transition: opacity 0.6s cubic-bezier(0.4, 0, 0.2, 1), transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
    will-change: opacity, transform;
  }

  .screen.hidden {
    opacity: 0;
    pointer-events: none;
    transform: scale(0.95) translate3d(0,0,0);
  }

  #screen1 { background: radial-gradient(ellipse at center, #1a0025 0%, #0a0010 70%); }

  .glow-text {
    font-size: clamp(2.2rem, 6vw, 4rem);
    font-weight: 900;
    color: #fff;
    text-shadow: 0 0 20px #ff6b9d, 0 0 40px #ff4488, 0 0 80px #cc0055;
    margin-bottom: 50px;
    text-align: center;
    letter-spacing: 2px;
    animation: pulse 2s ease-in-out infinite;
    will-change: text-shadow;
  }

  @keyframes pulse {
    0%, 100% { text-shadow: 0 0 20px #ff6b9d, 0 0 40px #ff4488, 0 0 80px #cc0055; }
    50%       { text-shadow: 0 0 30px #ff9dbe, 0 0 60px #ff6699, 0 0 120px #ff0066; }
  }

  .btn-main {
    background: linear-gradient(135deg, #ff2d7a, #c2006a);
    color: white;
    border: none;
    padding: 22px 60px;
    font-size: 1.5rem;
    font-family: 'Tajawal', sans-serif;
    font-weight: 700;
    border-radius: 50px;
    cursor: pointer;
    box-shadow: 0 0 30px #ff2d7a88, 0 8px 32px #00000088;
    transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    position: relative;
    z-index: 2;
  }

  #screen2 { background: radial-gradient(ellipse at center, #1a0020 0%, #0a0010 70%); }

  .btn-yes {
    background: linear-gradient(135deg, #ff2d7a, #c2006a);
    color: white;
    border: none;
    padding: 20px 55px;
    font-size: 1.6rem;
    font-family: 'Tajawal', sans-serif;
    font-weight: 700;
    border-radius: 50px;
    cursor: pointer;
    box-shadow: 0 0 30px #ff2d7a88;
    transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    z-index: 100;
  }

  .btn-no {
    background: transparent;
    color: #ff6b9d;
    border: 2px solid #ff6b9d;
    padding: 20px 55px;
    font-size: 1.6rem;
    font-weight: 700;
    border-radius: 50px;
    cursor: pointer;
    transition: all 0.3s cubic-bezier(0.19, 1, 0.22, 1);
    z-index: 100;
  }

  .big-rose {
    position: fixed;
    bottom: -120px;
    left: 50%;
    transform: translate3d(-50%, 0, 0);
    font-size: 7rem;
    z-index: 91; 
    pointer-events: none;
    filter: drop-shadow(0 0 40px #ff2d7a);
    animation: riseUp 2.5s cubic-bezier(0.22, 1, 0.36, 1) forwards;
  }

  @keyframes riseUp {
    0%   { bottom: -120px; opacity: 0; transform: translate3d(-50%, 0, 0) scale(0.5) rotate(-15deg); }
    30%  { opacity: 1; }
    70%  { transform: translate3d(-50%, 0, 0) scale(1.1) rotate(5deg); }
    100% { bottom: 2vh; opacity: 1; transform: translate3d(-50%, 0, 0) scale(1) rotate(0deg); }
  }

  #screen3 { z-index: 90; justify-content: flex-start; padding-top: 18vh; }

  .result-text {
    font-size: clamp(1.8rem, 5vw, 3.5rem);
    font-weight: 900;
    color: #fff;
    text-align: center;
    text-shadow: 0 0 20px #ff6b9d, 0 0 50px #ff2d7a;
    padding: 0 20px;
    line-height: 1.4;
    margin-bottom: 40px;
    white-space: pre-line;
    z-index: 100;
    min-height: 150px;
  }

  .btn-restart {
    background: transparent;
    color: #ff6b9d;
    border: 2px solid #ff6b9d;
    padding: 14px 40px;
    font-size: 1.2rem;
    font-weight: 700;
    border-radius: 50px;
    cursor: pointer;
    opacity: 0;
    transition: all 0.3s ease;
  }

  .btn-restart.visible { animation: fadeIn 1s ease forwards; }

  @keyframes fadeIn { from { opacity: 0; transform: translate3d(0, 10px, 0); } to { opacity: 1; transform: translate3d(0, 0, 0); } }

  .heart-burst {
    position: fixed;
    pointer-events: none;
    z-index: 200;
    font-size: 2rem;
    animation: heartFly 1.5s cubic-bezier(0.165, 0.84, 0.44, 1) forwards;
  }

  @keyframes heartFly {
    0%   { opacity: 1; transform: translate3d(0,0,0) scale(0.5); }
    100% { opacity: 0; transform: translate3d(var(--dx), var(--dy), 0) scale(1.5); }
  }

  .stars { position: fixed; inset: 0; z-index: 0; pointer-events: none; }
  .star { position: absolute; border-radius: 50%; background: white; animation: twinkle ease-in-out infinite; }

  @keyframes twinkle { 0%, 100% { opacity: 0.1; transform: scale(1); } 50% { opacity: 0.9; transform: scale(1.2); } }
</style>
</head>
<body>

<audio id="bgMusic" loop>
  <source src="https://server11.mp3quran.net/s_gmd/001.mp3" type="audio/mpeg">
</audio>

<div class="stars" id="stars"></div>
<div class="rose-rain" id="roseRain"></div>

<div class="screen" id="screen1">
  <div class="glow-text">أنتِ فطومه؟ 🌹</div>
  <button class="btn-main" onclick="startApp()">نعم، أنا فطومه 💕</button>
</div>

<div class="screen hidden" id="screen2">
  <div class="question-text">تحبيني؟</div>
  <div class="btn-row">
    <button class="btn-yes" onclick="answerYes()">آي 💖</button>
    <button class="btn-no" id="noBtn" onmouseover="moveButton()" onclick="moveButton()" ontouchstart="moveButton()">لا 😢</button>
  </div>
</div>

<div class="screen hidden" id="screen3">
  <div class="result-text" id="resultText"></div>
  <button class="btn-restart" id="restartBtn" onclick="restart()">إعادة من جديد 🔄</button>
</div>

<script>
  const starsEl = document.getElementById('stars');
  for (let i = 0; i < 80; i++) {
    const s = document.createElement('div');
    s.className = 'star';
    const size = Math.random() * 2 + 0.5;
    s.style.cssText = `width:${size}px; height:${size}px; left:${Math.random()*100}%; top:${Math.random()*100}%; animation-duration:${2+Math.random()*4}s;`;
    starsEl.appendChild(s);
  }

  const roseContainer = document.getElementById('roseRain');
  const roseEmojis = ['🌹','🌸','🌺','💐','🌷'];
  const loveWords = ['احبج', 'احبج مولاتي', 'احبج بنيتي', 'اامممح💋'];
  let rainInterval;

  function spawnRose() {
    const r = document.createElement('div');
    r.className = 'falling-rose';
    r.textContent = roseEmojis[Math.floor(Math.random()*roseEmojis.length)];
    r.style.left = Math.random()*100 + 'vw';
    const dur = 5 + Math.random()*5;
    r.style.animationDuration = dur + 's';
    roseContainer.appendChild(r);
    setTimeout(() => r.remove(), dur * 1000);
  }

  function spawnWord() {
    const w = document.createElement('div');
    w.className = 'falling-word';
    w.textContent = loveWords[Math.floor(Math.random()*loveWords.length)];
    w.style.left = Math.random()*90 + 'vw';
    const dur = 4 + Math.random()*3;
    w.style.animationDuration = dur + 's';
    roseContainer.appendChild(w);
    setTimeout(() => w.remove(), dur * 1000);
  }

  rainInterval = setInterval(spawnRose, 400);

  function startApp() {
    const audio = document.getElementById('bgMusic');
    audio.currentTime = 5; 
    audio.play().catch(e => console.log("Audio Play Failed"));
    transition('screen1', 'screen2');
  }

  function moveButton() {
    const btn = document.getElementById('noBtn');
    const x = Math.random() * (window.innerWidth - btn.offsetWidth - 50);
    const y = Math.random() * (window.innerHeight - btn.offsetHeight - 50);
    btn.style.position = 'fixed';
    btn.style.left = x + 'px';
    btn.style.top = y + 'px';
  }

  function typeWriter(text, i, callback) {
    if (i < text.length) {
      document.getElementById('resultText').innerHTML += text.charAt(i);
      setTimeout(() => typeWriter(text, i + 1, callback), 80);
    } else if (callback) { callback(); }
  }

  function transition(from, to) {
    document.getElementById(from).classList.add('hidden');
    setTimeout(() => document.getElementById(to).classList.remove('hidden'), 400);
  }

  function answerYes() {
    document.body.style.background = "radial-gradient(ellipse at center, #4a001a 0%, #0a0010 70%)";
    transition('screen2', 'screen3');
    
    // بدء نزول الكلمات المكتوبة بكثافة
    setInterval(spawnWord, 300);

    setTimeout(() => {
      typeWriter('أعرف إنك تحبيني 💖\nومهما ومهما صار.. أنتِ حبي 🌹', 0, () => {
        document.getElementById('restartBtn').classList.add('visible');
      });
      spawnBigRose('🌹');
      burstHearts();
    }, 800);
  }

  function spawnBigRose(emoji) {
    const r = document.createElement('div');
    r.className = 'big-rose';
    r.textContent = emoji;
    document.body.appendChild(r);
  }

  function burstHearts() {
    const cx = window.innerWidth / 2;
    const cy = window.innerHeight / 2;
    const hearts = ['💖','💗','💓','💞','💕','❤️'];
    for (let i = 0; i < 20; i++) {
      const h = document.createElement('div');
      h.className = 'heart-burst';
      h.textContent = hearts[Math.floor(Math.random()*hearts.length)];
      const angle = Math.random() * Math.PI * 2;
      const dist = 100 + Math.random() * 200;
      h.style.left = cx + 'px';
      h.style.top = cy + 'px';
      h.style.setProperty('--dx', Math.cos(angle)*dist + 'px');
      h.style.setProperty('--dy', Math.sin(angle)*dist + 'px');
      document.body.appendChild(h);
      setTimeout(() => h.remove(), 1500);
    }
  }

  function restart() { window.location.reload(); }
</script>
</body>
</html>
