<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>أبواب الأبدية: إرث الرماد</title>
    <style>
        body {
            background-color: #121212;
            color: #e0e0e0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        #game-container {
            background-color: #1e1e1e;
            border: 2px solid #d35400;
            border-radius: 10px;
            padding: 20px;
            width: 90%;
            max-width: 600px;
            box-shadow: 0 0 20px rgba(211, 84, 0, 0.5);
            text-align: center;
        }
        h1 {
            color: #e67e22;
            border-bottom: 1px solid #e67e22;
            padding-bottom: 10px;
        }
        #story-text {
            font-size: 1.2em;
            line-height: 1.6;
            margin-bottom: 20px;
            min-height: 100px;
        }
        .stats {
            display: flex;
            justify-content: space-around;
            background-color: #2c3e50;
            padding: 10px;
            border-radius: 5px;
            margin-bottom: 20px;
            font-weight: bold;
        }
        .health { color: #2ecc71; }
        .ash { color: #e74c3c; }
        .enemy-health { color: #9b59b6; }
        
        .choices button {
            background-color: #d35400;
            color: white;
            border: none;
            padding: 10px 20px;
            margin: 5px;
            border-radius: 5px;
            font-size: 1.1em;
            cursor: pointer;
            transition: background-color 0.3s;
            width: 100%;
        }
        .choices button:hover {
            background-color: #e67e22;
        }
        .choices button:disabled {
            background-color: #555;
            cursor: not-allowed;
        }
    </style>
</head>
<body>

<div id="game-container">
    <h1>أبواب الأبدية: إرث الرماد</h1>
    
    <div id="stats-panel" class="stats" style="display: none;">
        <div class="health">صحتك: <span id="player-hp">100</span></div>
        <div class="ash">عداد الرماد: <span id="player-ash">0</span>%</div>
        <div class="enemy-health" id="enemy-stats" style="display: none;">صحة الزعيم: <span id="enemy-hp">150</span></div>
    </div>

    <div id="story-text">
        مرحباً بك في عالم "إليريان". أنت "كايل"، المحارب المنبوذ ذو الذراع الملعونة. العالم يتهاوى، ويجب عليك الوصول إلى برج الأبدية.
    </div>

    <div id="choices" class="choices">
        <button onclick="startGame()">ابدأ الرحلة</button>
    </div>
</div>

<script>
    // متغيرات اللعبة
    let player = { hp: 100, ash: 0 };
    let boss = { name: "حارس البوابات النحاسي", hp: 150, maxHp: 150 };
    let inCombat = false;

    // عناصر الواجهة
    const storyText = document.getElementById("story-text");
    const choicesDiv = document.getElementById("choices");
    const statsPanel = document.getElementById("stats-panel");
    const playerHpSpan = document.getElementById("player-hp");
    const playerAshSpan = document.getElementById("player-ash");
    const enemyStatsDiv = document.getElementById("enemy-stats");
    const enemyHpSpan = document.getElementById("enemy-hp");

    function updateUI() {
        playerHpSpan.innerText = player.hp;
        playerAshSpan.innerText = player.ash;
        enemyHpSpan.innerText = boss.hp;
        
        // تحديث الألوان بناءً على الحالة
        if (player.ash >= 100) playerAshSpan.style.color = "red";
        else playerAshSpan.style.color = "#e74c3c";
    }

    function startGame() {
        statsPanel.style.display = "flex";
        player.hp = 100;
        player.ash = 0;
        boss.hp = boss.maxHp;
        updateUI();
        
        storyText.innerHTML = "أنت تقف الآن أمام بوابات مدينة الغسق المنهارة. فجأة، يظهر أمامك وحش معدني ضخم يسد الطريق.. إنه <b>حارس البوابات النحاسي</b>!";
        enemyStatsDiv.style.display = "block";
        inCombat = true;
        
        showCombatChoices();
    }

    function showCombatChoices() {
        choicesDiv.innerHTML = `
            <button onclick="attack('sword')">🗡️ ضربة السيف (تزيد الرماد)</button>
            <button onclick="attack('ash')" ${player.ash < 50 ? 'disabled' : ''}>🔥 ضربة الرماد القاضية (تستهلك 50 رماد)</button>
            <button onclick="heal()" ${player.ash < 30 ? 'disabled' : ''}>💚 تعافي بالرماد (تستهلك 30 رماد)</button>
        `;
    }

    function attack(type) {
        let damage = 0;
        let msg = "";

        if (type === 'sword') {
            damage = Math.floor(Math.random() * 10) + 10; // من 10 إلى 20 ضرر
            player.ash += 25; // تزيد الرماد
            msg = `ضربت الحارس بسيفك وسببت ${damage} ضرر. ذراعك بدأت تشتعل (زاد الرماد).`;
        } else if (type === 'ash') {
            damage = Math.floor(Math.random() * 20) + 30; // من 30 إلى 50 ضرر
            player.ash -= 50;
            msg = `أطلقت طاقة الرماد السوداء من ذراعك! ضربة مدمرة سببت ${damage} ضرر.`;
        }

        boss.hp -= damage;
        if (boss.hp < 0) boss.hp = 0;

        // التحقق من عقوبة الرماد الزائد
        if (player.ash > 100) {
            player.ash = 100;
            player.hp -= 15;
            msg += "<br><b>⚠️ تحذير: طاقة الرماد فاضت عن الحد! ذراعك تحترق وفقدت 15 من صحتك!</b>";
        }

        updateUI();

        if (boss.hp === 0) {
            winGame();
        } else {
            storyText.innerHTML = msg;
            choicesDiv.innerHTML = ""; // إخفاء الأزرار مؤقتاً
            setTimeout(enemyTurn, 2000); // دور العدو بعد ثانيتين
        }
    }

    function heal() {
        player.ash -= 30;
        let healAmount = 25;
        player.hp += healAmount;
        if (player.hp > 100) player.hp = 100;
        
        storyText.innerHTML = `استخدمت طاقة الرماد لعلاج جراحك. استعدت ${healAmount} نقطة صحة.`;
        updateUI();
        
        choicesDiv.innerHTML = "";
        setTimeout(enemyTurn, 2000);
    }

    function enemyTurn() {
        let enemyDamage = Math.floor(Math.random() * 15) + 5; // ضرر من 5 إلى 20
        player.hp -= enemyDamage;
        if (player.hp < 0) player.hp = 0;
        
        storyText.innerHTML += `<br><br>🛡️ الحارس النحاسي يضربك بفأسه العملاق مسبباً ${enemyDamage} ضرر!`;
        updateUI();

        if (player.hp === 0) {
            loseGame();
        } else {
            setTimeout(showCombatChoices, 1000); // إظهار أزرار اللاعب بعد ثانية
        }
    }

    function winGame() {
        inCombat = false;
        enemyStatsDiv.style.display = "none";
        storyText.innerHTML = "🎉 لقد سقط الحارس النحاسي! تفتح بوابات الأبدية ببطء... هذه مجرد البداية لرحلة كايل الطويلة. <br><b>النهاية (النسخة التجريبية).</b>";
        choicesDiv.innerHTML = `<button onclick="startGame()">إعادة اللعب</button>`;
    }

    function loseGame() {
        inCombat = false;
        storyText.innerHTML = "💀 لقد سقطت في المعركة... استهلكت لعنة الرماد ما تبقى من روحك. العالم سيغرق في الظلام للأبد.";
        choicesDiv.innerHTML = `<button onclick="startGame()">المحاولة مرة أخرى</button>`;
    }
</script>

</body>
</html>
