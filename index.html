<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>شاشة ترحيب</title>
    <style>
        /* إعدادات الصفحة لضمان تمركز العنصر في المنتصف تماماً */
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #1a1a1a; /* لون خلفية داكن لإبراز الكلمة */
            font-family: Arial, sans-serif;
            overflow: hidden; /* لمنع ظهور أشرطة التمرير */
        }

        /* تنسيق الكلمة وحركتها */
        .welcome-text {
            font-size: 5rem; /* حجم الخط */
            color: #ffffff; /* لون الخط */
            font-weight: bold;
            opacity: 0; /* تبدأ مخفية */
            /* استدعاء الحركة: مدتها 4 ثوانٍ وتتوقف عند آخر إطار */
            animation: appearGrowShrink 4s ease-in-out forwards;
        }

        /* تفاصيل الحركة */
        @keyframes appearGrowShrink {
            0% {
                transform: scale(0); /* تبدأ بحجم صفر من المنتصف */
                opacity: 0; /* مخفية تماماً */
            }
            30% {
                transform: scale(1.2); /* تكبر قليلاً عن حجمها الطبيعي */
                opacity: 1; /* تظهر بالكامل */
            }
            70% {
                transform: scale(1.2); /* تبقى على نفس الحجم لفترة لتتمكن من قراءتها */
                opacity: 1;
            }
            100% {
                transform: scale(0); /* تصغر وتعود لنقطة الصفر */
                opacity: 0; /* تختفي مجدداً */
            }
        }
    </style>
</head>
<body>

    <div class="welcome-text">العافية</div>

</body>
</html>
