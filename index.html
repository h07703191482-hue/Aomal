<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>شاشة ترحيب</title>
    <style>
        /* إعدادات الصفحة الأساسية */
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(45deg, #a8edea 0%, #fed6e3 100%); 
            font-family: Arial, sans-serif;
            overflow: hidden;
            transition: background 0.5s ease;
            position: relative;
        }

        /* زر الرجوع */
        .back-btn-main {
            position: absolute;
            top: 20px;
            right: 20px;
            padding: 10px 20px;
            background-color: #dc3545;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1.2rem;
            font-weight: bold;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            display: none; /* مخفي افتراضياً */
            z-index: 1000;
        }
        .back-btn-main:hover { background-color: #c82333; }

        /* حركة كلمة الترحيب */
        .welcome-text {
            font-size: 5rem;
            color: #ff0000;
            font-weight: bold;
            opacity: 0;
            animation: appearGrowShrink 4s ease-in-out forwards;
        }

        @keyframes appearGrowShrink {
            0% { transform: scale(0); opacity: 0; }
            30% { transform: scale(1.2); opacity: 1; }
            70% { transform: scale(1.2); opacity: 1; }
            100% { transform: scale(0); opacity: 0; }
        }

        /* الشاشات */
        #main-screen { display: none; gap: 30px; }
        .page-screen { display: none; width: 100%; height: 100%; justify-content: center; align-items: center; }

        .btn {
            padding: 15px 50px;
            font-size: 2rem;
            font-weight: bold;
            color: #fff;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            transition: transform 0.2s, background-color 0.2s;
        }
        .btn.send { background-color: #28a745; }
        .btn.receive { background-color: #007bff; }
        .btn:hover { transform: scale(1.05); }

        /* تنسيق صفحة الإرسال */
        .order-container {
            background-color: #ffffff;
            width: 90%;
            max-width: 500px;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
        }
        h2 { text-align: center; color: #333; margin-bottom: 30px; border-bottom: 2px solid #28a745; padding-bottom: 10px; }
        .item-row { display: flex; justify-content: space-between; align-items: center; padding: 15px 0; border-bottom: 1px solid #eee; }
        .item-name { font-size: 1.3rem; font-weight: bold; color: #444; }
        .quantity-box { display: flex; align-items: center; gap: 10px; }
        .qty-btn { background-color: #007bff; color: white; border: none; border-radius: 6px; width: 40px; height: 40px; font-size: 1.5rem; cursor: pointer; }
        .qty-btn.minus { background-color: #dc3545; }
        .quantity-box input { width: 50px; height: 40px; font-size: 1.3rem; text-align: center; border: 1px solid #ccc; border-radius: 6px; pointer-events: none; }
        .submit-btn { width: 100%; background-color: #28a745; color: #fff; border: none; padding: 15px; font-size: 1.3rem; font-weight: bold; border-radius: 8px; margin-top: 25px; cursor: pointer; }
    </style>
</head>
<body>

    <!-- زر الرجوع -->
    <button id="back-btn-main" class="back-btn-main" onclick="goBack()">رجوع</button>

    <!-- شاشة الترحيب -->
    <div id="welcome-text" class="welcome-text">العافية</div>

    <!-- الشاشة الرئيسية -->
    <div id="main-screen">
        <button class="btn send" onclick="showPage('send-screen')">إرسال</button>
        <button class="btn receive" onclick="showPage('receive-screen')">استلام</button>
    </div>

    <!-- صفحة الإرسال (مخفية افتراضياً) -->
    <div id="send-screen" class="page-screen">
        <div class="order-container">
            <h2>إرسال طلب جديد</h2>
            <div class="item-row">
                <div class="item-name">طبق عادي</div>
                <div class="quantity-box">
                    <button class="qty-btn" onclick="increaseQty('qty1')">+</button>
                    <input type="number" id="qty1" min="0" value="0">
                    <button class="qty-btn minus" onclick="decreaseQty('qty1')">-</button>
                </div>
            </div>
            <div class="item-row">
                <div class="item-name">طبق فنكر</div>
                <div class="quantity-box">
                    <button class="qty-btn" onclick="increaseQty('qty2')">+</button>
                    <input type="number" id="qty2" min="0" value="0">
                    <button class="qty-btn minus" onclick="decreaseQty('qty2')">-</button>
                </div>
            </div>
            <textarea style="width:100%; height:80px; margin-top:20px; border-radius:8px;" placeholder="ملاحظات الطلب..."></textarea>
            <button class="submit-btn" onclick="alert('تم تسجيل الطلب بنجاح!')">إرسال الطلب</button>
        </div>
    </div>

    <!-- صفحة الاستلام (مخفية افتراضياً) -->
    <div id="receive-screen" class="page-screen">
        <h2 style="color: #333;">صفحة الاستلام</h2>
    </div>

    <script>
        // إظهار القائمة الرئيسية بعد الترحيب
        setTimeout(function() {
            document.getElementById('welcome-text').style.display = 'none';
            document.getElementById('main-screen').style.display = 'flex';
        }, 4000);

        // وظائف التنقل
        function showPage(pageId) {
            document.getElementById('main-screen').style.display = 'none';
            document.getElementById(pageId).style.display = 'flex';
            document.getElementById('back-btn-main').style.display = 'block';
            document.body.style.background = '#ffffff';
        }

        function goBack() {
            document.getElementById('send-screen').style.display = 'none';
            document.getElementById('receive-screen').style.display = 'none';
            document.getElementById('main-screen').style.display = 'flex';
            document.getElementById('back-btn-main').style.display = 'none';
            document.body.style.background = 'linear-gradient(45deg, #a8edea 0%, #fed6e3 100%)';
        }

        // دوال الزيادة والنقصان
        function increaseQty(id) {
            var input = document.getElementById(id);
            input.value = parseInt(input.value) + 1;
        }
        function decreaseQty(id) {
            var input = document.getElementById(id);
            if (parseInt(input.value) > 0) input.value = parseInt(input.value) - 1;
        }
    </script>

</body>
</html>
